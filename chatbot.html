<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - GOD CODE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <div class="logo">
                <img src="image/asd.png" alt="Logo">
                GOD CODE
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="portfolio.html">Portfolio</a>
                <a href="favorites.html">Favorites</a>
                <a href="chatbot.html" class="active">AI Chat</a>
                <a href="#" onclick="window.close()">Close</a>
            </div>
        </div>
    </nav>

    <div id="particles-js"></div>
    
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-content">
                <div class="ai-avatar">🤖</div>
                <div class="chat-title">
                    <h2>AI Assistant</h2>
                    <p class="status">Powered by Gemini</p>
                </div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <p>Hello! I'm your AI assistant. How can I help you today?</p>
                </div>
            </div>
        </div>

        <div class="chat-input-container">
            <input type="text" id="chatInput" class="chat-input" placeholder="Type your message..." />
            <button id="sendBtn" class="send-btn">
                <span>Send</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="chatbot.js"></script>
    
    <!-- Floating Chatbot -->
    <div class="chatbot-button" id="chatbotButton">
        <div class="chatbot-icon">💬</div>
    </div>

    <div class="chatbot-window" id="chatbotWindow">
        <div class="chatbot-header">
            <div class="chatbot-header-content">
                <div class="chatbot-avatar">🤖</div>
                <div class="chatbot-info">
                    <h3>AI Assistant</h3>
                    <span class="chatbot-status">Online</span>
                </div>
            </div>
            <div class="chatbot-header-actions">
                <button class="chatbot-trash" id="chatbotTrash" title="Clear chat history">🗑️</button>
                <button class="chatbot-close" id="chatbotClose">✕</button>
            </div>
        </div>
        
        <div class="chatbot-messages" id="chatbotMessages">
            <div class="chatbot-message bot">
                <div class="chatbot-message-avatar">🤖</div>
                <div class="chatbot-message-content">
                    <p>Hello! How may I help you?</p>
                </div>
            </div>
        </div>
        
        <div class="chatbot-input-area">
            <div class="reply-preview" id="replyPreview" style="display: none;">
                <div class="reply-preview-content">
                    <div class="reply-preview-icon">↩️</div>
                    <div class="reply-preview-text">
                        <div class="reply-preview-label">Replying to message</div>
                        <div class="reply-preview-message" id="replyPreviewMessage"></div>
                    </div>
                </div>
                <button class="reply-preview-close" onclick="closeReplyPreview()">✕</button>
            </div>
            <div>
                <input type="text" id="chatbotInput" placeholder="Type a message..." />
                <button id="chatbotSend">➤</button>
            </div>
        </div>
    </div>
</body>
</html>
